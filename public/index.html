tom:18px\">01<\u002Fdiv><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:24px;margin-bottom:14px\">Assess<\u002Fdiv><div style=\"font-size:15px;line-height:1.7;color:#9fb0c2\">Site survey, source analysis, and a full demand profile of the home.<\u002Fdiv><\u002Fdiv>\n    <div style=\"border-left:1px solid rgba(255,255,255,.15);padding:8px 32px 8px 24px\"><div style=\"font-size:15px;color:#58a8ec;margin-bottom:18px\">02<\u002Fdiv><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:24px;margin-bottom:14px\">Model<\u002Fdiv><div style=\"font-size:15px;line-height:1.7;color:#9fb0c2\">Hydraulic modelling and system design validated before construction.<\u002Fdiv><\u002Fdiv>\n    <div style=\"border-left:1px solid rgba(255,255,255,.15);padding:8px 32px 8px 24px\"><div style=\"font-size:15px;color:#58a8ec;margin-bottom:18px\">03<\u002Fdiv><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:24px;margin-bottom:14px\">Build<\u002Fdiv><div style=\"font-size:15px;line-height:1.7;color:#9fb0c2\">Precision installation by engineers, documented to the millimetre.<\u002Fdiv><\u002Fdiv>\n    <div style=\"border-left:1px solid rgba(255,255,255,.15);padding:8px 32px 8px 24px\"><div style=\"font-size:15px;color:#58a8ec;margin-bottom:18px\">04<\u002Fdiv><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:24px;margin-bottom:14px\">Commission<\u002Fdiv><div style=\"font-size:15px;line-height:1.7;color:#9fb0c2\">Balancing, testing, and a handover you can measure.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- why us teaser -->\n<div style=\"padding:100px 64px 0\" data-mq=\"pad\" data-screen-label=\"Home — why us\">\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center\" data-mq=\"stack sgap\">\n    <div>\n      <div style=\"font-size:15px;color:#2e8fe0;font-weight:500;margin-bottom:14px\">Why Enkareflow<\u002Fdiv>\n      <h2 style=\"margin:0 0 20px;font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-weight:500;font-size:44px;letter-spacing:-.01em;text-wrap:pretty\" data-mq=\"h2\">Infrastructure discipline, applied at home.<\u002Fh2>\n      <p style=\"margin:0 0 28px;font-size:16.5px;line-height:1.75;color:#3d4a5c;max-width:52ch;text-wrap:pretty\">We treat a home’s water the way critical infrastructure is treated: surveyed, modelled, and standardised before anything is built. The story behind that approach is on our About page.<\u002Fp>\n      <a href=\"about.html\" style=\"display:inline-block;padding:14px 28px;border:1px solid rgba(15,27,45,.25);color:#0f1b2d;font-size:15px;font-weight:500;border-radius:999px\">Our approach &nbsp;→<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:20px\">\n      <div style=\"background:#f7f9fb;border:1px solid rgba(15,27,45,.08);border-radius:16px;padding:26px\"><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:19px;margin-bottom:8px\">One standard<\u002Fdiv><div style=\"font-size:14.5px;line-height:1.65;color:#55606e\">100% ISO Metric, with components from Tier-1 manufacturers only.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#f7f9fb;border:1px solid rgba(15,27,45,.08);border-radius:16px;padding:26px\"><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:19px;margin-bottom:8px\">Real conditions<\u002Fdiv><div style=\"font-size:14.5px;line-height:1.65;color:#55606e\">Designed for county mains, boreholes, and rainwater, as they actually behave.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- CTA -->\n<div style=\"padding:100px 64px\" data-mq=\"pad vpad\" data-screen-label=\"Home — CTA\">\n  <div style=\"background:linear-
