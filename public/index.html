document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

>\n    <img src=\"a99a5bfb-a249-420c-82af-bd81740ea619\" alt=\"Modern hillside home with infinity pool and warm interior lighting at dusk\" style=\"width:100%;height:100%;object-fit:cover;object-position:center;display:block;transform:scaleX(-1)\">\n  <\u002Fdiv>\n  <div style=\"position:absolute;inset:0;background:linear-gradient(270deg,#0f1b2d 0%,rgba(15,27,45,.92) 30%,rgba(15,27,45,.55) 60%,rgba(15,27,45,.12) 100%);pointer-events:none\" data-mq=\"fade\"><\u002Fdiv>\n  <div style=\"position:relative;z-index:1;pointer-events:none\">\n    <div style=\"padding:120px 64px 130px;max-width:900px;width:fit-content;margin-left:auto;pointer-events:auto\" data-mq=\"hero\">\n      <span style=\"display:inline-flex;align-items:center;gap:10px;padding:11px 24px;border:1.5px solid #58a8ec;border-radius:999px;font-size:13px;font-weight:600;letter-spacing:.14em;color:#fff;background:rgba(15,27,45,.45)\"><span style=\"width:8px;height:8px;background:#58a8ec;border-radius:50%\"><\u002Fspan>RESIDENTIAL WATER ENGINEERING<\u002Fspan>\n      <h1 style=\"margin:34px 0 28px;font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-weight:500;font-size:78px;line-height:1.05;letter-spacing:-.01em;text-wrap:pretty;color:#fff\" data-mq=\"heroh1\">Water systems designed as one.<\u002Fh1>\n      <p style=\"margin:0 0 36px;font-size:19px;line-height:1.7;color:rgba(255,255,255,.85);max-width:46ch;text-wrap:pretty\">Enkareflow designs complete water systems for high-value homes in Kenya and East Africa. We calculate supply, storage, pressure, distribution, treatment, heating, and irrigation around the conditions on your site.<\u002Fp>\n      <div style=\"display:flex;gap:16px;align-items:center\" data-mq=\"wrap\">\n        <a href=\"contact.html\" style=\"padding:17px 34px;background:#fff;color:#0f1b2d;font-size:16px;font-weight:500;border-radius:999px\">Discuss your project<\u002Fa>\n        <a href=\"services.html\" style=\"padding:17px 34px;border:1px solid rgba(255,255,255,.45);color:#fff;font-size:16px;font-weight:500;border-radius:999px;background:rgba(15,27,45,.3)\">View our services<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- stats band -->\n<div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px;padding:56px 64px;background:#ffffff;border-top:1px solid rgba(15,27,45,.08);border-bottom:1px solid rgba(15,27,45,.08)\" data-mq=\"stack pad\" data-screen-label=\"Home — stats\">\n  <div style=\"text-align:center\"><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:24px;font-weight:500\">Designed before installation<\u002Fdiv><div style=\"font-size:15px;color:#55606e;margin-top:8px;line-height:1.6;max-width:34ch;margin-left:auto;margin-right:auto\">Demand, pressure, flow, and equipment are calculated before work begins.<\u002Fdiv><\u002Fdiv>\n  <div style=\"text-align:center\"><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:24px;font-weight:500\">Built for the source<\u002Fdiv><div style=\"font-size:15px;color:#55606e;margin-top:8px;line-height:1.6;max-width:34ch;margin-left:auto;margin-right:auto\">County supply, borehole, rainwater, and storage are considered in the design.<\u002Fdiv><\u002Fdiv>\n  <div style=\"text-align:center\"><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:24px;font-weight:500\">Documented at handover<\u002Fdiv><div style=\"font-size:15px;color:#55606e;margin-top:8px;line-height:1.6;max-width:34ch;margin-left:auto;margin-right:auto\">Clients receive the final drawings, isolation information, and equipment records.<\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n\n<!-- how we work -->\n<div id=\"how-we-work\" style=\"background:#0a1626;padding:110px 64px;color:#fff;scroll-margin-top:12px\" data-mq=\"pad vpad\" data-screen-label=\"Home — how we work\">\n  <div style=\"font-size:15px;color:#58a8ec;font-weight:500;margin-bottom:14px\">How we work<\u002Fdiv>\n  <h2 style=\"margin:0 0 72px;font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-weight:500;font-size:52px;letter-spacing:-.01em;max-width:20ch;text-wrap:pretty\" data-mq=\"h2\">From site conditions to a tested system.<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr)\" data-mq=\"stack sgap\">\n    <div style=\"border-left:1px solid rgba(255,255,255,.15);padding:8px 32px 8px 24px\"><div style=\"font-size:15px;color:#58a8ec;margin-bottom:18px\">01<\u002Fdiv><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:24px;margin-bottom:14px\">Assess<\u002Fdiv><div style=\"font-size:15px;line-height:1.7;color:#9fb0c2\">We survey the property, review the water source, and build a demand profile for the home.<\u002Fdiv><\u002Fdiv>\n    <div style=\"border-left:1px solid rgba(255,255,255,.15);padding:8px 32px 8px 24px\"><div style=\"font-size:15px;color:#58a8ec;margin-bottom:18px\">02<\u002Fdiv><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:24px;margin-bottom:14px\">Design<\u002Fdiv><div style=\"font-size:15px;line-height:1.7;color:#9fb0c2\">We calculate flow and pressure, size the equipment, and coordinate the system with the architectural and construction plans.<\u002Fdiv><\u002Fdiv>\n    <div style=\"border-left:1px solid rgba(255,255,255,.15);padding:8px 32px 8px 24px\"><div style=\"font-size:15px;color:#58a8ec;margin-bottom:18px\">03<\u002Fdiv><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:24px;margin-bottom:14px\">Install<\u002Fdiv><div style=\"font-size:15px;line-height:1.7;color:#9fb0c2\">The approved design guides installation, material selection, routing, zoning, and access for future servicing.<\u002Fdiv><\u002Fdiv>\n    <div style=\"border-left:1px solid rgba(255,255,255,.15);padding:8px 32px 8px 24px\"><div style=\"font-size:15px;color:#58a8ec;margin-bottom:18px\">04<\u002Fdiv><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:24px;margin-bottom:14px\">Commission<\u002Fdiv><div style=\"font-size:15px;line-height:1.7;color:#9fb0c2\">We test and balance the system, record the installed layout, and hand over the operating information.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- why us teaser -->\n<div style=\"padding:100px 64px 0\" data-mq=\"pad\" data-screen-label=\"Home — why us\">\n  <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:72px;align-items:center\" data-mq=\"stack sgap\">\n    <div>\n      <div style=\"font-size:15px;color:#2e8fe0;font-weight:500;margin-bottom:14px\">Why Enkareflow<\u002Fdiv>\n      <h2 style=\"margin:0 0 20px;font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-weight:500;font-size:44px;letter-spacing:-.01em;text-wrap:pretty\" data-mq=\"h2\">One design. One standard. One accountable system.<\u002Fh2>\n      <p style=\"margin:0 0 28px;font-size:16.5px;line-height:1.75;color:#3d4a5c;max-width:52ch;text-wrap:pretty\">Residential water systems are often assembled one component at a time. A pump is selected before peak demand is known. Treatment is added without considering the source. Pipe sizes change on site. Enkareflow starts with the complete network so that each decision supports the next.<\u002Fp>\n      <a href=\"about.html\" style=\"display:inline-block;padding:14px 28px;border:1px solid rgba(15,27,45,.25);color:#0f1b2d;font-size:15px;font-weight:500;border-radius:999px\">Our approach &nbsp;→<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:20px\">\n      <div style=\"background:#f7f9fb;border:1px solid rgba(15,27,45,.08);border-radius:16px;padding:26px\"><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:19px;margin-bottom:8px\">Designed for local conditions<\u002Fdiv><div style=\"font-size:14.5px;line-height:1.65;color:#55606e\">We account for variable county supply, borehole performance, rainwater collection, storage, power availability, and the demands of large homes.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#f7f9fb;border:1px solid rgba(15,27,45,.08);border-radius:16px;padding:26px\"><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:19px;margin-bottom:8px\">Coordinated before construction<\u002Fdiv><div style=\"font-size:14.5px;line-height:1.65;color:#55606e\">Drawings and equipment requirements are agreed before walls, floors, and plant spaces make changes expensive.<\u002Fdiv><\u002Fdiv>\n      <div style=\"background:#f7f9fb;border:1px solid rgba(15,27,45,.08);border-radius:16px;padding:26px\"><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:19px;margin-bottom:8px\">Recorded for the owner<\u002Fdiv><div style=\"font-size:14.5px;line-height:1.65;color:#55606e\">The final documentation shows what was installed, where key components are located, and how the system can be isolated and serviced.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- who we work with -->\n<div style=\"padding:100px 64px 0\" data-mq=\"pad\" data-screen-label=\"Home — who we work with\">\n  <div style=\"font-size:15px;color:#2e8fe0;font-weight:500;margin-bottom:14px\">Who we work with<\u002Fdiv>\n  <h2 style=\"margin:0 0 56px;font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-weight:500;font-size:44px;letter-spacing:-.01em;text-wrap:pretty\" data-mq=\"h2\">Built around the project team.<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:48px\" data-mq=\"stack sgap\">\n    <div style=\"border-top:2px solid #2e8fe0;padding-top:22px\"><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:21px;margin-bottom:12px\">Homeowners<\u002Fdiv><div style=\"font-size:15px;line-height:1.7;color:#3d4a5c\">Understand the system before you approve the cost, and retain the records after handover.<\u002Fdiv><\u002Fdiv>\n    <div style=\"border-top:2px solid #2e8fe0;padding-top:22px\"><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:21px;margin-bottom:12px\">Architects and designers<\u002Fdiv><div style=\"font-size:15px;line-height:1.7;color:#3d4a5c\">Coordinate plant space, risers, service routes, fixtures, heating zones, and irrigation early in the design.<\u002Fdiv><\u002Fdiv>\n    <div style=\"border-top:2px solid #2e8fe0;padding-top:22px\"><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:21px;margin-bottom:12px\">Contractors<\u002Fdiv><div style=\"font-size:15px;line-height:1.7;color:#3d4a5c\">Work from an agreed system design with defined materials, routes, testing, and handover requirements.<\u002Fdiv><\u002Fdiv>\n    <div style=\"border-top:2px solid #2e8fe0;padding-top:22px\"><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:21px;margin-bottom:12px\">Remote owners<\u002Fdiv><div style=\"font-size:15px;line-height:1.7;color:#3d4a5c\">Review drawings and specifications before installation, with a documented record of the completed system.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- CTA -->\n<div style=\"padding:100px 64px\" data-mq=\"pad vpad\" data-screen-label=\"Home — CTA\">\n  <div style=\"background:linear-gradient(120deg,#1273b8 0%,#0d4d84 45%,#0a1c33 100%);border-radius:28px;padding:96px 64px;text-align:center;color:#fff\" data-mq=\"cardpad\">\n    <h2 style=\"margin:0 0 22px;font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-weight:500;font-size:48px;line-height:1.15;letter-spacing:-.01em;text-wrap:pretty\" data-mq=\"h2\">Start with the conditions on your site.<\u002Fh2>\n    <p style=\"margin:0 auto 40px;font-size:17px;line-height:1.7;color:rgba(255,255,255,.85);max-width:58ch\">Tell us the project location, construction stage, water source, and systems you are considering. We will review the information and respond within two business days with the recommended next step.<\u002Fp>\n    <a href=\"contact.html\" style=\"display:inline-block;padding:17px 36px;background:#fff;color:#0f1b2d;font-size:16px;font-weight:500;border-radius:999px\">Discuss your project<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- footer -->\n<div style=\"background:#0a1626;color:#9fb0c2;padding:80px 64px 40px\" data-mq=\"pad\" data-screen-label=\"Home — footer\">\n  <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:48px\" data-mq=\"stack\">\n    <div>\n      <span style=\"display:flex;align-items:center;margin-bottom:24px\"><img src=\"6cb00637-6f59-4f30-a800-4150721d4300\" alt=\"Enkareflow\" style=\"height:34px;width:auto;display:block\"><\u002Fspan><p style=\"margin:0;font-size:15px;line-height:1.8;max-width:44ch\">Complete residential water systems for high-value homes in Kenya and East Africa.<\u002Fp>\n      \n    <\u002Fdiv>\n    <div data-mq=\"flinks\" style=\"display:flex;flex-direction:column;gap:12px;font-size:15px\"><span style=\"color:#fff;font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;margin-bottom:6px\">Explore<\u002Fspan><a href=\"services.html\">Services<\u002Fa><a href=\"about.html\">About<\u002Fa><a href=\"contact.html\">Contact<\u002Fa><a href=\"privacy.html\">Privacy<\u002Fa><a href=\"terms.html\">Terms<\u002Fa><\u002Fdiv>\n    <div data-mq=\"flinks\" style=\"display:flex;flex-direction:column;gap:12px;font-size:15px\"><span style=\"color:#fff;font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;margin-bottom:6px\">Contact<\u002Fspan><a href=\"mailto:info@enkareflow.com\">info@enkareflow.com<\u002Fa><!-- PLACEHOLDER PHONE: replace +254-800-FLOW / tel & wa.me 2548003569 with the final number before launch --><span>WhatsApp / Direct: <a href=\"tel:+2548003569\">+254-800-FLOW<\u002Fa><\u002Fspan><span>Based in Nairobi, serving Kenya and East Africa by appointment.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,.12);margin-top:56px;padding-top:28px;font-size:14px\" data-mq=\"col\">\n    <span>© 2026 Enkareflow. All rights reserved.<\u002Fspan>\n    <span style=\"display:flex;gap:20px;align-items:center\" data-mq=\"wrap\"><span>Systems specified to recognised standards and documented for service.<\u002Fspan><\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
