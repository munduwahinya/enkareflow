document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\nbody{margin:0;background:#eef3f7;font-family:'Public Sans',system-ui,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;color:#0f1b2d}\na{color:inherit;text-decoration:none}a:hover{color:#2e8fe0}\na:focus-visible,button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid #2e8fe0;outline-offset:2px;border-radius:4px}\n\n@media (max-width:820px){\n[data-mq~=pad]{padding-left:24px!important;padding-right:24px!important}\n[data-mq~=vpad]{padding-top:64px!important;padding-bottom:64px!important}\n[data-mq~=nav]{flex-wrap:wrap!important;row-gap:16px!important;padding:16px 24px!important}\n[data-mq~=navcluster]{display:contents!important}\n[data-mq~=navlinks]{order:3!important;width:100%!important;justify-content:space-between!important;gap:14px!important}\n[data-mq~=stack]{grid-template-columns:1fr!important}\n[data-mq~=sgap]{gap:32px!important}\n[data-mq~=grid2]{grid-template-columns:1fr 1fr!important}\n[data-mq~=h1]{font-size:40px!important}\n[data-mq~=h2]{font-size:30px!important}\n[data-mq~=hero]{padding:64px 24px 80px!important}\n[data-mq~=heroh1]{font-size:44px!important}\n[data-mq~=fade]{background:rgba(255,255,255,.87)!important}\n[data-mq~=wrap]{flex-wrap:wrap!important}\n[data-mq~=col]{flex-direction:column!important;align-items:flex-start!important;gap:12px!important}\n[data-mq~=cardpad]{padding:56px 24px!important}\n[data-mq~=formpad]{padding:24px 18px!important}\n[data-mq~=himg]{min-height:320px!important}\n[data-mq~=navlinks] a{padding:10px 0!important}\n[data-mq~=flinks] a{padding:8px 0!important}\n}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<!-- nav -->\n<div style=\"display:flex;align-items:center;justify-content:space-between;padding:24px 64px\" data-mq=\"nav\" data-screen-label=\"About — nav\">\n  <a href=\"index.html\" style=\"display:flex;align-items:center;gap:12px\">\n    <img src=\"e53d1685-2542-4e7a-a3aa-79b322bbf784\" alt=\"Enkareflow\" style=\"height:36px;width:auto;display:block\">\n  <\u002Fa>\n  <div data-mq=\"navcluster\" style=\"display:flex;align-items:center;gap:40px\">\n  <div style=\"display:flex;gap:32px;font-size:15px;font-weight:500;color:#3d4a5c\" data-mq=\"navlinks\">\n    <a href=\"services.html\">Services<\u002Fa>\n    <a href=\"about.html\" style=\"color:#0f1b2d\">About<\u002Fa>\n  <\u002Fdiv>\n  <a href=\"contact.html\" style=\"padding:13px 26px;background:#0f1b2d;color:#fff;font-size:15px;font-weight:500;border-radius:999px\">Start a project<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- head -->\n<div style=\"padding:80px 64px 0\" data-mq=\"pad\" data-screen-label=\"About — approach\">\n  <div style=\"font-size:15px;color:#2e8fe0;font-weight:500;margin-bottom:14px\">Our approach<\u002Fdiv>\n  <h1 style=\"margin:0 0 22px;font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-weight:500;font-size:62px;line-height:1.08;letter-spacing:-.01em;max-width:20ch;text-wrap:pretty\" data-mq=\"h1\">An engineering studio for the modern home.<\u002Fh1>\n  <p style=\"margin:0 0 56px;font-size:17px;line-height:1.7;color:#55606e;max-width:58ch;text-wrap:pretty\">Enkareflow exists for architects, builders, and homeowners who treat water infrastructure as part of the design, not an afterthought. We bring the rigour of industrial hydraulics to residential craft.<\u002Fp>\n  <div style=\"position:relative;min-height:520px;border-radius:24px;overflow:hidden\" data-mq=\"himg\">\n    <div style=\"position:absolute;inset:0\"><img src=\"f37f8569-b745-4953-8fc6-06ad4aef8baa\" alt=\"Enkareflow engineers reviewing a hydraulic manifold wall in the studio\" style=\"width:100%;height:100%;object-fit:cover;display:block\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- principles -->\n<div style=\"padding:88px 64px 40px;display:grid;grid-template-columns:1fr 1fr;gap:72px 96px\" data-mq=\"stack pad sgap\" data-screen-label=\"About — principles\">\n  <div style=\"display:grid;grid-template-columns:56px 1fr;gap:8px\">\n    <span style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:22px;color:#c2ccd6\">01<\u002Fspan>\n    <div><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:23px;margin-bottom:12px\">Precision over guesswork<\u002Fdiv><div style=\"font-size:15.5px;line-height:1.75;color:#3d4a5c\">Every system is modelled and calculated before it's built. We measure so you never have to wonder.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:56px 1fr;gap:8px\">\n    <span style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:22px;color:#c2ccd6\">02<\u002Fspan>\n    <div><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:23px;margin-bottom:12px\">Quiet by design<\u002Fdiv><div style=\"font-size:15.5px;line-height:1.75;color:#3d4a5c\">The best water system is the one you never notice: silent pumps, even pressure, effortless comfort.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:56px 1fr;gap:8px\">\n    <span style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:22px;color:#c2ccd6\">03<\u002Fspan>\n    <div><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:23px;margin-bottom:12px\">Built to outlast<\u002Fdiv><div style=\"font-size:15.5px;line-height:1.75;color:#3d4a5c\">Materials and methods chosen for decades of service, documented for whoever comes next.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:grid;grid-template-columns:56px 1fr;gap:8px\">\n    <span style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:22px;color:#c2ccd6\">04<\u002Fspan>\n    <div><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:23px;margin-bottom:12px\">Engineering restraint<\u002Fdiv><div style=\"font-size:15.5px;line-height:1.75;color:#3d4a5c\">Clean, considered, and honest engineering: nothing decorative, nothing wasted.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- story -->\n<div style=\"padding:60px 64px;display:grid;grid-template-columns:1fr 1fr;gap:96px\" data-mq=\"stack pad sgap\" data-screen-label=\"About — story\">\n  <div>\n    <h2 style=\"margin:0 0 18px;font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-weight:500;font-size:36px;letter-spacing:-.01em\">Water is a network.<\u002Fh2>\n    <p style=\"margin:0 0 18px;font-size:15.5px;line-height:1.8;color:#3d4a5c;text-wrap:pretty\">Before founding Enkareflow, our background was in designing and managing complex cloud and network architectures for global technology firms. In the digital world, infrastructure is never left to chance; it is meticulously planned, strictly standardised, and thoroughly documented.<\u002Fp>\n    <p style=\"margin:0;font-size:15.5px;line-height:1.8;color:#3d4a5c;text-wrap:pretty\">Water flow is, at its core, a routing and delivery network. It deserves the same systems-thinking as data flow, so we architect integrated hydraulic ecosystems, not piecemeal plumbing.<\u002Fp>\n  <\u002Fdiv>\n  <div>\n    <h2 style=\"margin:0 0 18px;font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-weight:500;font-size:36px;letter-spacing:-.01em\">One unified system.<\u002Fh2>\n    <p style=\"margin:0 0 18px;font-size:15.5px;line-height:1.8;color:#3d4a5c;text-wrap:pretty\">Supply, storage, pressure, distribution, hydronic heating, and irrigation, all engineered as a single system on strict European Metric (ISO) standards, with components drawn exclusively from Tier-1 manufacturers.<\u002Fp>\n    <p style=\"margin:0;font-size:15.5px;line-height:1.8;color:#3d4a5c;text-wrap:pretty\">Every project is handed over with an \"as-built\" digital dossier: precise schematics, isolation maps, and component manuals, so you always know exactly what powers your home.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- what you receive -->\n<div style=\"background:#f7f9fb;border-top:1px solid rgba(15,27,45,.08);border-bottom:1px solid rgba(15,27,45,.08);padding:96px 64px\" data-mq=\"pad vpad\" data-screen-label=\"About — what you receive\">\n  <div style=\"font-size:15px;color:#2e8fe0;font-weight:500;margin-bottom:14px\">What you receive<\u002Fdiv>\n  <h2 style=\"margin:0 0 64px;font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-weight:500;font-size:44px;letter-spacing:-.01em;max-width:22ch;text-wrap:pretty\" data-mq=\"h2\">Every project ships with the same four deliverables.<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:48px\" data-mq=\"stack sgap\">\n    <div style=\"border-top:2px solid #2e8fe0;padding-top:22px\"><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:21px;margin-bottom:12px\">Measured design<\u002Fdiv><div style=\"font-size:15px;line-height:1.7;color:#3d4a5c\">A demand profile and hydraulic model built from your site survey, not assumptions.<\u002Fdiv><\u002Fdiv>\n    <div style=\"border-top:2px solid #2e8fe0;padding-top:22px\"><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:21px;margin-bottom:12px\">Documented schematics<\u002Fdiv><div style=\"font-size:15px;line-height:1.7;color:#3d4a5c\">Signed-off drawings of the full network before installation begins. You keep them.<\u002Fdiv><\u002Fdiv>\n    <div style=\"border-top:2px solid #2e8fe0;padding-top:22px\"><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:21px;margin-bottom:12px\">Commissioning &amp; balancing<\u002Fdiv><div style=\"font-size:15px;line-height:1.7;color:#3d4a5c\">Every zone tested and balanced to its design flows and pressures at handover.<\u002Fdiv><\u002Fdiv>\n    <div style=\"border-top:2px solid #2e8fe0;padding-top:22px\"><div style=\"font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-size:21px;margin-bottom:12px\">As-built digital handover<\u002Fdiv><div style=\"font-size:15px;line-height:1.7;color:#3d4a5c\">A digital dossier of what was actually built: schematics, isolation maps, component manuals.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- CTA -->\n<div style=\"padding:80px 64px 100px\" data-mq=\"pad\" data-screen-label=\"About — CTA\">\n  <div style=\"background:#0a1626;border-radius:28px;padding:96px 64px;text-align:center;color:#fff\" data-mq=\"cardpad\">\n    <h2 style=\"margin:0 0 36px;font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;font-weight:500;font-size:46px;letter-spacing:-.01em;text-wrap:pretty\" data-mq=\"h2\">Precision you can feel in every room.<\u002Fh2>\n    <a href=\"contact.html\" style=\"display:inline-block;padding:17px 36px;background:#fff;color:#0f1b2d;font-size:16px;font-weight:500;border-radius:999px\">Start a project &nbsp;→<\u002Fa>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- footer -->\n<div style=\"background:#0a1626;color:#9fb0c2;padding:80px 64px 40px\" data-mq=\"pad\" data-screen-label=\"About — footer\">\n  <div style=\"display:grid;grid-template-columns:1.6fr 1fr 1fr;gap:48px\" data-mq=\"stack\">\n    <div>\n      <span style=\"display:flex;align-items:center;margin-bottom:24px\"><img src=\"30116e03-d03a-45dd-a571-4ffd281d622e\" alt=\"Enkareflow\" style=\"height:34px;width:auto;display:block\"><\u002Fspan>\n      <p style=\"margin:0;font-size:15px;line-height:1.8;max-width:44ch\">Hydraulic design, radiant comfort, and clean water for exceptional homes, engineered in Kenya for clients across Africa.<\u002Fp>\n    <\u002Fdiv>\n    <div data-mq=\"flinks\" style=\"display:flex;flex-direction:column;gap:12px;font-size:15px\"><span style=\"color:#fff;font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;margin-bottom:6px\">Explore<\u002Fspan><a href=\"services.html\">Services<\u002Fa><a href=\"about.html\">About<\u002Fa><a href=\"contact.html#faq\">FAQ<\u002Fa><a href=\"contact.html\">Contact<\u002Fa><\u002Fdiv>\n    <div data-mq=\"flinks\" style=\"display:flex;flex-direction:column;gap:12px;font-size:15px\"><span style=\"color:#fff;font-family:'Space Grotesk','Avenir Next','Segoe UI','Trebuchet MS',Verdana,sans-serif;margin-bottom:6px\">Contact<\u002Fspan><a href=\"mailto:info@enkareflow.com\">info@enkareflow.com<\u002Fa><span>WhatsApp / Direct: <a href=\"tel:+254800FLOW\">+254-800-FLOW<\u002Fa><\u002Fspan><span>Nairobi, serving Kenya &amp; East Africa<\u002Fspan><span>By appointment<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,.12);margin-top:56px;padding-top:28px;font-size:14px\" data-mq=\"col\">\n    <span>© 2026 Enkareflow. Engineered residential water systems.<\u002Fspan>\n    <span>100% ISO Metric · Tier-1 components<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n\n\n<\u002Fbody><\u002Fhtml>"
